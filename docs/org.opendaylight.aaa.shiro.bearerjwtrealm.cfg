# BearerJwtRealm configuration
# Deploy this file to etc/ to enable JWT signature verification in BearerJwtRealm.
# Without this file the realm accepts any well-formed JWT without verification.
#
# OSGi metatype naming: underscores in property names map to dots (e.g. jwks_uri -> jwks.uri).

# ---------------------------------------------------------------------------
# JWKS URI (required)
# URL of the JSON Web Key Set endpoint.  Public keys are fetched on first use
# and refreshed automatically by nimbus RemoteJWKSet / DefaultJWKSetCache.
#
jwks.uri=http://keycloak.local:8080/realms/odl-realm/protocol/openid-connect/certs
#

# ---------------------------------------------------------------------------
# Expected issuer (optional — leave commented out to skip issuer check)
# Must match the "iss" claim in the JWT exactly.
#
expected.issuer=http://keycloak.local:8080/realms/odl-realm
#

# ---------------------------------------------------------------------------
# Expected audience (optional — leave commented out to skip audience check)
# Must match at least one value in the "aud" claim.
# Multiple values can be specified as a comma-separated list.
#
expected.audience=odl-application

# ---------------------------------------------------------------------------
# Allowed signing algorithms (default: RS256)
# Comma-separated list of JWS algorithm identifiers.
# Common values: RS256, RS384, RS512, ES256, ES384, ES512
#
allowed.algorithms=RS256

# ---------------------------------------------------------------------------
# User claim (default: preferred_username)
# JWT claim name from which the username is extracted.
# Use "sub" for identity providers that store the username in the subject claim.
#
user.claim=preferred_username

# ---------------------------------------------------------------------------
# Role claim (default: roles)
# JWT claim name from which the list of roles is extracted.
# The claim value must be a JSON array of strings.
# Common alternatives: groups, realm_access.roles
#
role.claim=roles

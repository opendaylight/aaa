# Example configuration for org.opendaylight.aaa.shiro.bearerjwtrealm.cfg
#
# Array properties (expected-audience, allowed-algorithms) are written as comma-separated
# plain values — no JSON brackets. OSGi/Felix ConfigAdmin maps these to String[] because
# their AttributeDefinition uses cardinality = Integer.MIN_VALUE.
#
jwks-uri=https://keycloak.example.com/realms/odl/protocol/openid-connect/certs
expected-issuer=https://keycloak.example.com/realms/odl
expected-audience=odl-app,odl-admin
allowed-algorithms=RS256,RS384

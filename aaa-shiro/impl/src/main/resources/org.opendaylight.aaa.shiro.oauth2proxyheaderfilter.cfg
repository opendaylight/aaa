# Maximum allowed length of an X-Forwarded-User or X-Forwarded-Groups header value in bytes (DoS safeguard)
max-header-length = 4096
# Maximum allowed length of a single role name in characters
max-role-length = 128
# Maximum allowed length of a username in characters
max-user-length = 128
# Maximum number of roles per user (DoS safeguard against unbounded allocation)
max-roles-per-user = 200
# Regular expression character class for whitelisted characters in usernames and role names
# regular expression see: https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/regex/Pattern.html#cc
allowed-chars = [a-zA-Z0-9_.:\\-@]
